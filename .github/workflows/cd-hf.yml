name: CD — Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "src/**"
      - "models/**"
      - "configs/**"
      - "docker/Dockerfile.hf"
      - "requirements.txt"

jobs:
  deploy:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Deploy to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface-hub

          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path=".",
              repo_id="YOUR_HF_USERNAME/guardianshield",
              repo_type="space",
              ignore_patterns=[
                  ".git*", ".github*", "mlruns/", "htmlcov/",
                  "*.pyc", "__pycache__", ".env", "*.db",
                  "notebooks/", "tests/", ".pytest_cache/",
              ],
          )
          print("Deployment to HuggingFace Spaces complete!")
          EOF
