name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install black flake8 isort

      - name: Check code formatting (black)
        run: black --check --diff src/ tests/ app/

      - name: Check import order (isort)
        run: isort --check-only src/ tests/ app/

      - name: Lint (flake8)
        run: |
          flake8 src/ tests/ app/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501

  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Download PyThaiNLP corpus
        run: python -c "import pythainlp; pythainlp.corpus.download('words_th')" || true

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short
        env:
          LOG_LEVEL: WARNING

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -f docker/Dockerfile.api -t guardianshield-api:test .
          echo "API image built successfully"

      - name: Build App Docker image
        run: |
          docker build -f docker/Dockerfile.app -t guardianshield-app:test .
          echo "App image built successfully"
