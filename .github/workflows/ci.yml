  # ─────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -f docker/Dockerfile.api -t scamguard-api:test .
          echo "API image built successfully"

      - name: Build App Docker image
        run: |
          docker build -f docker/Dockerfile.app -t scamguard-app:test .
          echo "App image built successfully"

  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    # needs: test
    # Only deploy on direct pushes to main — not on pull requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH into GCP VM and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: GROQ_API_KEY,LINE_CHANNEL_SECRET,LINE_CHANNEL_ACCESS_TOKEN
          script: |
            set -e
            cd ${{ secrets.GCP_APP_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Injecting secrets into .env..."
            touch .env
            for VAR in GROQ_API_KEY LINE_CHANNEL_SECRET LINE_CHANNEL_ACCESS_TOKEN; do
              VALUE=$(eval echo \$$VAR)
              if grep -q "^${VAR}=" .env; then
                sed -i "s|^${VAR}=.*|${VAR}=${VALUE}|" .env
              else
                echo "${VAR}=${VALUE}" >> .env
              fi
            done

            echo "==> Rebuilding and restarting all services..."
            docker compose up -d --build

            echo "==> Waiting for services to be healthy..."
            sleep 10

            echo "==> Service status:"
            docker compose ps

            echo "==> Deploy complete."
