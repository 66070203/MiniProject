  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    # Only deploy on direct pushes to main — not on pull requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.GCP_HOST }}"         ] && missing="$missing\n  - GCP_HOST"
          [ -z "${{ secrets.GCP_USER }}"         ] && missing="$missing\n  - GCP_USER"
          [ -z "${{ secrets.GCP_SSH_KEY }}"      ] && missing="$missing\n  - GCP_SSH_KEY"
          [ -z "${{ secrets.GCP_APP_PATH }}"     ] && missing="$missing\n  - GCP_APP_PATH"
          [ -z "${{ secrets.GROQ_API_KEY }}"     ] && missing="$missing\n  - GROQ_API_KEY"
          [ -z "${{ secrets.LINE_CHANNEL_SECRET }}"     ] && missing="$missing\n  - LINE_CHANNEL_SECRET"
          [ -z "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" ] && missing="$missing\n  - LINE_CHANNEL_ACCESS_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets. Add them in Settings → Secrets and variables → Actions:$missing"
            exit 1
          fi
          echo "All required secrets are present."

      - name: SSH into GCP VM and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: GROQ_API_KEY,LINE_CHANNEL_SECRET,LINE_CHANNEL_ACCESS_TOKEN
          script: |
            set -e

            echo "==> Setting up app directory..."
            if [ ! -d "${{ secrets.GCP_APP_PATH }}/.git" ]; then
              echo "==> First time: cloning repository..."
              mkdir -p "${{ secrets.GCP_APP_PATH }}"
              git clone https://github.com/${{ github.repository }}.git "${{ secrets.GCP_APP_PATH }}"
            fi

            cd ${{ secrets.GCP_APP_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Injecting secrets into .env..."
            touch .env
            for VAR in GROQ_API_KEY LINE_CHANNEL_SECRET LINE_CHANNEL_ACCESS_TOKEN; do
              VALUE=$(eval echo \$$VAR)
              if grep -q "^${VAR}=" .env; then
                sed -i "s|^${VAR}=.*|${VAR}=${VALUE}|" .env
              else
                echo "${VAR}=${VALUE}" >> .env
              fi
            done

            echo "==> Exporting environment variables for Docker Compose..."
            export GROQ_API_KEY
            export LINE_CHANNEL_SECRET
            export LINE_CHANNEL_ACCESS_TOKEN

            echo "==> Building images..."
            docker compose build api app

            echo "==> Checking if model needs training..."
            mkdir -p models data/raw data/processed logs
            if [ ! -f models/best_model.joblib ]; then
              echo "==> Model not found — running first-time training (may take a few minutes)..."
              docker compose run --rm train
              echo "==> Training complete."
            else
              echo "==> Model already exists, skipping training."
            fi

            echo "==> Starting all services..."
            docker compose up -d

            echo "==> Waiting for services to be healthy..."
            sleep 10

            echo "==> Service status:"
            docker compose ps

            echo "==> Deploy complete."
