services:
  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: scamguard-api
    ports:
      - "80:80"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///./scamguard.db
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Streamlit Frontend
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: scamguard-app
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:80
      - LOG_LEVEL=INFO
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Model Training (run once on first deploy, or manually to retrain)
  # Usage: docker compose run --rm train
  # ─────────────────────────────────────────────────────────────────────────
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: scamguard-train
    profiles: ["train"]
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    command: >
      sh -c "python -m src.data.generator &&
             python -m src.data.ingestion &&
             python -m src.models.trainer"

  # ─────────────────────────────────────────────────────────────────────────
  # MLflow Tracking Server
  # ─────────────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: scamguard-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: ["mlflow", "server", "--backend-store-uri", "/mlflow/mlruns", "--default-artifact-root", "/mlflow/mlruns", "--host", "0.0.0.0", "--port", "5000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  logs:

networks:
  default:
    name: scamguard-network
